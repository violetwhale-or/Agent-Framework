<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeek Agent</title>
<!-- marked.js：在浏览器端渲染 Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100vh; display: flex; background: #1a1a2e; color: #e0e0e0;
  }
  /* 左侧会话列表面板 */
  .sidebar {
    width: 240px; background: #16162a; display: flex; flex-direction: column;
    border-right: 1px solid #2a2a4a;
  }
  .sidebar-header {
    padding: 20px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #2a2a4a;
  }
  .session-list { flex: 1; overflow-y: auto; padding: 10px; }
  .session-item {
    padding: 10px 14px; margin-bottom: 4px; border-radius: 8px; cursor: pointer;
    font-size: 14px; transition: background 0.2s;
  }
  .session-item:hover { background: #2a2a4a; }
  .session-item.active { background: #3a3a6a; }
  .new-btn {
    margin: 10px; padding: 10px; border-radius: 8px; border: 1px solid #4a4a8a;
    background: transparent; color: #e0e0e0; cursor: pointer; font-size: 14px;
  }
  .new-btn:hover { background: #2a2a4a; }

  /* 右侧聊天区域 */
  .main { flex: 1; display: flex; flex-direction: column; }
  .chat-header {
    padding: 16px 24px; border-bottom: 1px solid #2a2a4a; font-size: 15px; color: #888;
  }
  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .message {
    max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6;
    font-size: 14px; white-space: pre-wrap; word-wrap: break-word;
  }
  .message.user {
    align-self: flex-end; background: #3a3a8a; border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start; background: #2a2a4a; border-bottom-left-radius: 4px;
  }
  .message.tool {
    align-self: flex-start; background: #1a3a2a; border-bottom-left-radius: 4px;
    color: #8c8; font-family: monospace; font-size: 13px;
  }
  .message code {
    background: #1a1a3a; padding: 2px 6px; border-radius: 4px; font-size: 13px;
  }
  .message pre {
    background: #1a1a3a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0;
  }

  /* 思考过程折叠区 */
  .thinking-fold {
    margin-bottom: 8px; border-radius: 8px; overflow: hidden;
    background: #1e1e38; border: 1px solid #2a2a5a;
  }
  .thinking-header {
    padding: 6px 12px; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #8888cc; transition: background 0.2s;
  }
  .thinking-header:hover { background: #2a2a5a; }
  .thinking-arrow { font-size: 11px; transition: transform 0.2s; }
  .thinking-arrow.collapsed { transform: rotate(-90deg); }
  .thinking-content {
    padding: 0 12px 8px; font-family: monospace; font-size: 13px;
    color: #7777aa; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
  }
  .thinking-content.hidden { display: none; }

  /* 输入区域 */
  .input-area {
    padding: 16px 24px; border-top: 1px solid #2a2a4a; display: flex; gap: 12px;
  }
  .input-area input {
    flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid #3a3a5a;
    background: #16162a; color: #e0e0e0; font-size: 14px; outline: none;
  }
  .input-area input:focus { border-color: #5a5aaa; }
  .input-area button {
    padding: 12px 24px; border-radius: 10px; border: none; background: #4a4aaa;
    color: white; font-size: 14px; cursor: pointer; transition: background 0.2s;
  }
  .input-area button:hover { background: #5a5aba; }
  .input-area button:disabled { background: #3a3a5a; cursor: not-allowed; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">💬 对话</div>
  <div class="session-list" id="sessionList"></div>
  <button class="new-btn" onclick="newSession()">＋ 新对话</button>
</div>

<div class="main">
  <div class="chat-header" id="chatHeader">选择一个对话</div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter') send()">
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
</div>

<script>
let currentSession = null;
let eventSource = null;

// 加载会话列表
async function loadSessions() {
  const res = await fetch('/api/sessions');
  const data = await res.json();
  const list = document.getElementById('sessionList');
  list.innerHTML = '';
  data.sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSession ? ' active' : '');
    div.textContent = s.preview || s.name || '空对话';
    div.onclick = () => switchSession(s.id);
    list.appendChild(div);
  });
}

// 切换会话
async function switchSession(sid) {
  currentSession = sid;
  document.getElementById('chatHeader').textContent = '当前对话';
  const msgDiv = document.getElementById('messages');
  msgDiv.innerHTML = '';
  loadSessions();
  closeEventSource();

  // 加载历史消息
  try {
    const res = await fetch(`/api/sessions/${sid}/history`);
    const data = await res.json();
    data.messages.forEach(m => addMessage(m.role, m.content));
  } catch (e) { /* 无历史时保持空白 */ }
}

// 新建会话
async function newSession() {
  const res = await fetch('/api/sessions', { method: 'POST' });
  const data = await res.json();
  switchSession(data.session_id);
}

// 关闭旧 SSE
function closeEventSource() {
  if (eventSource) { eventSource.close(); eventSource = null; }
}

// 切换思考过程折叠
function toggleThinking(header) {
  const content = header.nextElementSibling;
  const arrow = header.querySelector('.thinking-arrow');
  content.classList.toggle('hidden');
  arrow.classList.toggle('collapsed');
}

// 发送消息
async function send() {
  const input = document.getElementById('userInput');
  const msg = input.value.trim();
  if (!msg || !currentSession) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  // 显示用户消息
  addMessage('user', msg);
  // 添加 AI 消息容器
  const aiDiv = addMessage('assistant', '');
  // AI 消息内追加折叠区和正文容器
  const thinkingFold = document.createElement('div');
  thinkingFold.className = 'thinking-fold';
  thinkingFold.style.display = 'none';
  const thinkingHeader = document.createElement('div');
  thinkingHeader.className = 'thinking-header';
  thinkingHeader.onclick = function() { toggleThinking(this); };
  thinkingHeader.innerHTML = '<span class="thinking-arrow">▾</span><span>🤔 思考过程</span>';
  const thinkingContent = document.createElement('div');
  thinkingContent.className = 'thinking-content';
  thinkingFold.appendChild(thinkingHeader);
  thinkingFold.appendChild(thinkingContent);
  aiDiv.appendChild(thinkingFold);

  const answerDiv = document.createElement('div');
  answerDiv.className = 'answer-content';
  aiDiv.appendChild(answerDiv);

  try {
    const response = await fetch(`/chat/${currentSession}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let currentEvent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('event: ')) {
          currentEvent = line.slice(7).trim();
          continue;
        }
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '""' || data === '') continue;
          try {
            const parsed = JSON.parse(data);

            if (currentEvent === 'thinking' && parsed.text) {
              // 显示折叠区 + 追加思考内容
              thinkingFold.style.display = '';
              thinkingContent.textContent += parsed.text + '\n';
              scrollToBottom();

            } else if (currentEvent === 'token' && parsed.text) {
              // 追加正文
              answerDiv.textContent += parsed.text;
              scrollToBottom();

            } else if (currentEvent === 'error' && parsed.error) {
              answerDiv.innerHTML = '⚠️ ' + parsed.error;
            }
          } catch (e) { /* 忽略非 JSON 行 */ }
        }

        if (currentEvent === 'done') {
          // 最终渲染：正文转 Markdown，剥离残留标签
          let finalText = answerDiv.textContent
            .replace(/\[SUMMARY\][\s\S]*?\[\/SUMMARY\]/g, '')
            .replace(/\[KEYWORDS\][\s\S]*?\[\/KEYWORDS\]/g, '')
            .replace(/\[\/?SUMMARY\]|\[\/?KEYWORDS\]/g, '');
          answerDiv.innerHTML = marked.parse(finalText);
          // 默认折叠思考过程
          if (thinkingFold.style.display !== 'none') {
            thinkingContent.classList.add('hidden');
            thinkingHeader.querySelector('.thinking-arrow').classList.add('collapsed');
          }
        }
      }
    }
  } catch (e) {
    answerDiv.textContent = '⚠️ 请求失败: ' + e.message;
  }

  document.getElementById('sendBtn').disabled = false;
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// 添加消息到界面
function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message ' + (role === 'tool' ? 'tool' : role);
  if (role === 'assistant' && content) {
    div.innerHTML = marked.parse(content);
  } else {
    div.textContent = content;
  }
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop =
    document.getElementById('messages').scrollHeight;
  return div;
}

// 初始化
loadSessions();
</script>
</body>
</html>

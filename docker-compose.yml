services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - ./rag_data:/app/rag_data
      - ./agent_sessions.json:/app/agent_sessions.json
      - ./sessions_index.json:/app/sessions_index.json
      - /home/zhong/.cache/huggingface:/root/.cache/huggingface
